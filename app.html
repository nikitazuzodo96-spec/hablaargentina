  const map = new Map();
  LESSONS.forEach(l => allPhrases(l).forEach(ph => map.set(ph.es, ph)));

  return [...map.values()];
})();

  try {
    const vs = window.speechSynthesis?.getVoices?.() || [];
    return vs.find(v => v.lang === "es-AR")
      || vs.find(v => (v.lang || "").startsWith("es-4"))
      || vs.find(v => (v.lang || "").startsWith("es"))
      || null;
  } catch (e) { return null; }
}

function speak(text) {
  try {
    if (!SOUND) return;
    const s = window.speechSynthesis;
    if (!s) return;
    s.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/\.\.\./g, ""));
    const v = pickVoice();
    if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = "es-AR"; }
    u.rate = 0.88;
    s.speak(u);
  } catch (e) { /* озвучка недоступна */ }
}

function Speak({ text, light }) {
  return (

      onClick={(e) => { e.stopPropagation(); speak(text); }}

// ============ ПРОГРЕСС (интервальное повторение, localStorage) ============
const STORE_KEY = "habla-progress";

function useProgress() {
  const [prog, setProg] = useState({});
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) setProg(JSON.parse(raw));
    } catch (e) { /* пусто — первый запуск */ }
    try { window.speechSynthesis?.getVoices?.(); } catch (e) {}
  }, []);

  const record = (es, correct) => {
    setProg(prev => {
      const cur = prev[es] || { lvl: 0, err: 0 };
      const next = {
        ...prev,
        [es]: {
          lvl: correct ? Math.min((cur.lvl || 0) + 1, 3) : 0,
          err: (cur.err || 0) + (correct ? 0 : 1),
        },
      };
      try { localStorage.setItem(STORE_KEY, JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };

  const reset = () => {
    setProg({});
    try { localStorage.setItem(STORE_KEY, "{}"); } catch (e) {}
  };

  return [prog, record, reset];
}

// Фразы, которые надо повторить: были ошибки и ещё не закреплены (lvl < 3)
const reviewList = (prog) =>
  ALL_PHRASES.filter(ph => { const s = prog[ph.es]; return s && s.err > 0 && (s.lvl || 0) < 3; });

// Взвешенная выборка: фразы с ошибками попадаются чаще
function weightedSample(pool, prog, n) {
  const arr = pool.map(ph => {
    const s = prog[ph.es];
    const w = 1 + (s ? s.err * 2 + ((s.lvl || 0) < 2 ? 2 : 0) : 0);
    return { ph, w };
  });
  const res = [];
  while (res.length < n && arr.length) {
    const total = arr.reduce((sum, x) => sum + x.w, 0);
    let r = Math.random() * total, i = 0;
    for (; i < arr.length - 1; i++) { r -= arr[i].w; if (r <= 0) break; }
    res.push(arr.splice(i, 1)[0].ph);
  }
  return res;
}

function QuizView({ pool, prog, record, count = 10, doneText }) {
  const makeQuestions = () => weightedSample(pool, prog, Math.min(count, pool.length)).map(ph => {
    const wrong = ALL_PHRASES.filter(x => x.ru !== ph.ru && x.es !== ph.es)
      .sort(() => Math.random() - 0.5).slice(0, 3);
    return { ph, options: [...wrong, ph].sort(() => Math.random() - 0.5) };
  });
  const [questions, setQuestions] = useState(makeQuestions);
  const [qi, setQi] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const q = questions[qi];

  const pick = (opt) => {
    if (picked !== null) return;
    setPicked(opt);
    const ok = opt.ru === q.ph.ru;
    if (ok) setScore(s => s + 1);
    record(q.ph.es, ok);
    speak(q.ph.es);
  };
  const next = () => {
    setPicked(null);
    if (qi + 1 >= questions.length) setDone(true); else setQi(qi + 1);
  };
  const restart = () => { setQuestions(makeQuestions()); setQi(0); setPicked(null); setScore(0); setDone(false); };

  if (!q) return <div style={{ color: C.gray, textAlign: "center", padding: 30 }}>Нет фраз для теста.</div>;

  if (done) {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div style={{ textAlign: "center", padding: "30px 0", display: "flex",
        flexDirection: "column", alignItems: "center", gap: 14 }}>
        <Sun size={54} />
        <div style={{ fontSize: 30, fontWeight: 800, color: C.ink }}>{score} / {questions.length}</div>
        <div style={{ fontSize: 16, color: C.gray, maxWidth: 340 }}>
          {pct === 100 ? (doneText || "¡Perfecto! Можно смело идти в магазин 🇦🇷")
            : pct >= 70 ? "¡Muy bien! Ошибки попадут в «Повторение» — закрепи их там"
            : "Dale, ошибки сохранены в «Повторение» — они будут попадаться чаще"}
        </div>
        <button onClick={restart} style={btnStyle(true)}>Пройти ещё раз</button>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: C.gray }}>
        <span>Вопрос {qi + 1} из {questions.length}</span><span>✓ {score}</span>
      </div>
      <div style={{ height: 6, background: C.celesteLight, borderRadius: 3 }}>
        <div style={{ height: 6, width: `${(qi / questions.length) * 100}%`,
          background: C.celeste, borderRadius: 3, transition: "width .3s" }} />
      </div>
      <div style={{ background: "#fff", border: `2px solid ${C.celeste}`, borderRadius: 16,
        padding: "20px 18px", textAlign: "center", position: "relative" }}>
        <div style={{ position: "absolute", top: 10, right: 10 }}><Speak text={q.ph.es} /></div>
        <div style={{ fontSize: 13, color: C.gray, marginBottom: 6 }}>Что это значит?</div>
        <div style={{ fontSize: 23, fontWeight: 700, color: C.ink }}>{q.ph.es}</div>
        <div style={{ fontSize: 15, color: C.celesteDark, fontStyle: "italic", marginTop: 4 }}>{q.ph.tr}</div>
        {prog[q.ph.es]?.err > 0 && (
          <div style={{ fontSize: 11.5, color: C.sun, fontWeight: 700, marginTop: 6 }}>
            🔁 раньше здесь была ошибка
          </div>
        )}
      </div>
      <div style={{ display: "grid", gap: 8 }}>
        {q.options.map((opt, i) => {
          let bg = "#fff", border = C.border, color = C.ink;
          if (picked !== null) {
            if (opt.ru === q.ph.ru) { bg = "#EAF7F0"; border = C.green; color = C.green; }
            else if (opt === picked) { bg = "#FBEDED"; border = C.red; color = C.red; }
          }
          return (
            <button key={i} onClick={() => pick(opt)}
              style={{ background: bg, border: `2px solid ${border}`, color,
                borderRadius: 12, padding: "13px 16px", fontSize: 15.5, fontWeight: 500,
                textAlign: "left", cursor: picked === null ? "pointer" : "default",
                fontFamily: font, transition: "all .15s" }}>
              {opt.ru}
            </button>
          );
        })}
      </div>
      {picked !== null && (
        <button onClick={next} style={{ ...btnStyle(true), alignSelf: "center" }}>
          {qi + 1 >= questions.length ? "Результат" : "Дальше →"}
        </button>
      )}
    </div>
  );
}

// --- Диалог-симуляция ---
function DialogueView({ dialogue, record }) {
  // индексы реплик "u" (ходы игрока)
  const userSteps = useMemo(() =>
    dialogue.steps.map((s, i) => s.who === "u" ? i : -1).filter(i => i >= 0), [dialogue]);
  const [turn, setTurn] = useState(0); // номер текущего хода игрока
  const [answered, setAnswered] = useState([]); // выбранные правильные реплики
  const [wrongPick, setWrongPick] = useState(null);
  const [tries, setTries] = useState(0);
  const finished = turn >= userSteps.length;

  // сколько шагов диалога показывать
  const visibleUpTo = finished ? dialogue.steps.length : userSteps[turn];
  const current = finished ? null : dialogue.steps[userSteps[turn]];

  const options = useMemo(() => {
    if (!current) return [];
    return [current.ok, ...current.alt].sort(() => Math.random() - 0.5);
  }, [current]);

  const pick = (opt) => {
    if (!current) return;
    const ok = opt.es === current.ok.es;
    record(current.ok.es, ok);
    if (ok) {
      speak(current.ok.es);
      setAnswered([...answered, current.ok]);
      setWrongPick(null);
      setTries(0);
      setTurn(turn + 1);
    } else {
      setWrongPick(opt.es);
      setTries(tries + 1);
    }
  };

  const restart = () => { setTurn(0); setAnswered([]); setWrongPick(null); setTries(0); };

  const bubbles = [];
  let ui = 0;
  for (let i = 0; i < visibleUpTo; i++) {
    const s = dialogue.steps[i];
    if (s.who === "v") bubbles.push({ who: "v", es: s.es, tr: s.tr, ru: s.ru });
    else { bubbles.push({ who: "u", ...answered[ui] }); ui++; }
  }
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {bubbles.map((b, i) => (
          <div key={i} style={{ display: "flex",
            justifyContent: b.who === "u" ? "flex-end" : "flex-start" }}>
            <div style={{ maxWidth: "85%", borderRadius: 16,
              borderBottomLeftRadius: b.who === "v" ? 4 : 16,
              borderBottomRightRadius: b.who === "u" ? 4 : 16,
              background: b.who === "u" ? C.celeste : "#fff",
              border: b.who === "u" ? "none" : `1px solid ${C.border}`,
              padding: "10px 14px", display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{ minWidth: 0 }}>
                {b.who === "v" && (
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.celesteDark, marginBottom: 2 }}>
                    {dialogue.vendor}
                  </div>
                )}
                <div style={{ fontSize: 16, fontWeight: 600,
                  color: b.who === "u" ? "#fff" : C.ink }}>{b.es}</div>
                <div style={{ fontSize: 13, fontStyle: "italic",
                  color: b.who === "u" ? "rgba(255,255,255,.85)" : C.celesteDark }}>{b.tr}</div>
                <div style={{ fontSize: 13,
                  color: b.who === "u" ? "rgba(255,255,255,.75)" : C.gray }}>{b.ru}</div>
              </div>
              <Speak text={b.es} light={b.who === "u"} />
            </div>
          </div>
        ))}
      </div>

      {finished ? (
        <div style={{ textAlign: "center", display: "flex", flexDirection: "column",
          alignItems: "center", gap: 12, padding: "16px 0" }}>
          <Sun size={44} />
          <div style={{ fontSize: 20, fontWeight: 800, color: C.ink }}>¡Diálogo completado!</div>
          <div style={{ fontSize: 14.5, color: C.gray }}>
            Диалог пройден. Фразы с ошибками попадут в «Повторение».
          </div>
          <button onClick={restart} style={btnStyle(true)}>Пройти ещё раз</button>
        </div>
      ) : (
        <div style={{ background: C.celesteLight, borderRadius: 16, padding: "14px 14px 16px" }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.ink, marginBottom: 10 }}>
            👉 {current.task}
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {options.map((opt, i) => {
              const isWrong = wrongPick === opt.es;
              return (
                <button key={i} onClick={() => pick(opt)}
                  style={{ background: isWrong ? "#FBEDED" : "#fff",
                    border: `2px solid ${isWrong ? C.red : C.border}`,
                    borderRadius: 12, padding: "11px 14px", textAlign: "left",
                    cursor: "pointer", fontFamily: font }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: isWrong ? C.red : C.ink }}>{opt.es}</div>
                  <div style={{ fontSize: 12.5, fontStyle: "italic", color: C.celesteDark }}>{opt.tr}</div>
                  {tries >= 2 && <div style={{ fontSize: 12.5, color: C.gray }}>{opt.ru}</div>}
                </button>
              );
            })}
          </div>
          {wrongPick && (
            <div style={{ fontSize: 12.5, color: C.red, marginTop: 8 }}>
              Не то — попробуй ещё раз{tries >= 2 ? " (подсказка: показал переводы)" : ""}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// --- Найди пару: два столбика, испанский ↔ русский ---
function MatchView({ pool, prog, record }) {
  const [round, setRound] = useState(0);
  const pairs = useMemo(
    () => weightedSample(pool, prog, Math.min(6, pool.length)),
    [pool, round] // eslint-disable-line
  );
  const rightCol = useMemo(() => [...pairs].sort(() => Math.random() - 0.5), [pairs]);
  const [selL, setSelL] = useState(null);
  const [selR, setSelR] = useState(null);
  const [matched, setMatched] = useState({});
  const [wrong, setWrong] = useState(null); // { l, r }
  const [errs, setErrs] = useState(0);
  const allDone = pairs.length > 0 && pairs.every(ph => matched[ph.es]);

  const evaluate = (l, r) => {
    if (l === r) {
      setMatched(m => ({ ...m, [l]: true }));
      record(l, true);
      speak(l);
    } else {
      setWrong({ l, r });
      record(l, false);
      setErrs(e => e + 1);
      setTimeout(() => setWrong(null), 700);
    }
    setSelL(null); setSelR(null);
  };

  const clickL = (es) => {
    if (matched[es] || wrong) return;
    if (selR) evaluate(es, selR); else setSelL(selL === es ? null : es);
  };
  const clickR = (es) => {
    if (matched[es] || wrong) return;
    if (selL) evaluate(selL, es); else setSelR(selR === es ? null : es);
  };

  const nextRound = () => {
    setRound(r => r + 1); setMatched({}); setSelL(null); setSelR(null);
    setWrong(null); setErrs(0);
  };

  const cellStyle = (state) => ({
    background: state === "done" ? "#EAF7F0" : state === "sel" ? C.celesteLight
      : state === "wrong" ? "#FBEDED" : "#fff",
    border: `2px solid ${state === "done" ? C.green : state === "sel" ? C.celeste
      : state === "wrong" ? C.red : C.border}`,
    color: state === "done" ? C.green : state === "wrong" ? C.red : C.ink,
    opacity: state === "done" ? 0.65 : 1,
    borderRadius: 12, padding: "11px 10px", textAlign: "left", width: "100%",
    cursor: state === "done" ? "default" : "pointer", fontFamily: font,
    transition: "all .15s", minHeight: 58,
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: C.gray }}>
        <span>Соедини испанское слово с переводом</span>
        <span style={{ color: errs ? C.red : C.gray }}>✗ {errs}</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <div style={{ display: "grid", gap: 8, alignContent: "start" }}>
          {pairs.map(ph => {
            const state = matched[ph.es] ? "done"
              : wrong?.l === ph.es ? "wrong"
              : selL === ph.es ? "sel" : "idle";
            return (
              <button key={ph.es} onClick={() => clickL(ph.es)} style={cellStyle(state)}>
                <div style={{ fontSize: 14.5, fontWeight: 700 }}>{ph.es}</div>
                <div style={{ fontSize: 12, fontStyle: "italic", color: C.celesteDark }}>{ph.tr}</div>
              </button>
            );
          })}
        </div>
        <div style={{ display: "grid", gap: 8, alignContent: "start" }}>
          {rightCol.map(ph => {
            const state = matched[ph.es] ? "done"
              : wrong?.r === ph.es ? "wrong"
              : selR === ph.es ? "sel" : "idle";
            return (
              <button key={ph.es} onClick={() => clickR(ph.es)} style={cellStyle(state)}>
                <div style={{ fontSize: 14 }}>{ph.ru}</div>
              </button>
            );
          })}
        </div>
      </div>
      {allDone && (
        <div style={{ textAlign: "center", display: "flex", flexDirection: "column",
          alignItems: "center", gap: 12, padding: "10px 0" }}>
          <Sun size={40} />
          <div style={{ fontSize: 18, fontWeight: 800, color: C.ink }}>
            {errs === 0 ? "¡Perfecto! Без единой ошибки" : `Готово! Ошибок: ${errs}`}
          </div>
          <button onClick={nextRound} style={btnStyle(true)}>Следующие 6 →</button>
        </div>
      )}
    </div>
  );
}

    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={() => setTab("rules")} style={pillStyle(tab === "rules")}>Правила чтения</button>
        <button onClick={() => setTab("abc")} style={pillStyle(tab === "abc")}>Алфавит</button>
      </div>
      {tab === "rules" ? (
        <div style={{ display: "grid", gap: 10 }}>
          <div style={{ fontSize: 14, color: C.gray, lineHeight: 1.5 }}>
            Главная особенность аргентинского испанского — буквы <b>LL</b> и <b>Y</b> читаются как русская <b>Ш</b>. Именно поэтому «yo» звучит как «шо».
          </div>
          {READING_RULES.map((r, i) => (
            <div key={i} style={{ background: "#fff", border: `1px solid ${C.border}`,
              borderRadius: 14, padding: "14px 16px" }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.celesteDark, marginBottom: 8 }}>{r.rule}</div>
              {r.ex.map((e, j) => (
                <div key={j} style={{ fontSize: 14.5, color: C.ink, marginBottom: 3,
                  display: "flex", alignItems: "center", gap: 8 }}>
                  <Speak text={e[0]} />
                  <span><b>{e[0]}</b> <span style={{ color: C.celesteDark, fontStyle: "italic" }}>({e[1]})</span>
                  <span style={{ color: C.gray }}> — {e[2]}</span></span>
                </div>
              ))}
            </div>
          ))}
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(90px, 1fr))", gap: 8 }}>
          {ALPHABET.map(([l, s], i) => (
            <div key={i} onClick={() => speak(l)} style={{ background: "#fff",
              border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 6px",
              textAlign: "center", cursor: "pointer" }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.ink }}>{l}</div>
              <div style={{ fontSize: 12.5, color: C.gray }}>{s}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============ ГЛАВНЫЙ КОМПОНЕНТ ============
function App() {
  const [screen, setScreen] = useState({ page: "home" });
  const [mode, setMode] = useState("study");
  const [hideRu, setHideRu] = useState(false);
  const [prog, record, resetProg] = useProgress();
  const [sound, setSound] = useState(true);
  const toggleSound = () => {
    SOUND = !sound;
    if (!SOUND) { try { window.speechSynthesis?.cancel(); } catch (e) {} }
    setSound(!sound);
  };
  const muteBtn = (
    <button onClick={toggleSound} title={sound ? "Выключить звук" : "Включить звук"}
      style={{ marginLeft: "auto", background: "rgba(255,255,255,.2)", border: "none",
        color: "#fff", borderRadius: 999, width: 40, height: 40, fontSize: 18,
        cursor: "pointer", flexShrink: 0 }}>
      {sound ? "🔊" : "🔇"}
    </button>
  );

  const review = reviewList(prog);

  const openLesson = (lesson) => { setMode("study"); setHideRu(false); setScreen({ page: "lesson", lesson }); };

  const headerTitle =
    screen.page === "basics" ? "📖 Основы"
    : screen.page === "lesson" ? `${screen.lesson.emoji} ${screen.lesson.title}`
    : screen.page === "dialogue" ? `${screen.dialogue.emoji} ${screen.dialogue.title}`
    : screen.page === "review" ? "🔁 Повторение"
    : "";

  return (
    <div style={{ minHeight: "100vh", background: C.paper, fontFamily: font, color: C.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; }
        button:focus-visible { outline: 3px solid ${C.sun}; outline-offset: 2px; }
      `}</style>

      <div style={{ background: `linear-gradient(180deg, ${C.celeste} 0%, ${C.celesteDark} 100%)`,
        padding: screen.page === "home" ? "28px 20px 24px" : "16px 20px", color: "#fff" }}>
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          {screen.page === "home" ? (
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Sun size={40} />
              <div>
                <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5 }}>Habla Argentina</div>
                <div style={{ fontSize: 14, opacity: .9 }}>Испанский для жизни в Аргентине — с нуля</div>
              </div>
              {muteBtn}
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={() => setScreen({ page: "home" })}
                style={{ background: "rgba(255,255,255,.2)", border: "none", color: "#fff",
                  borderRadius: 10, padding: "7px 13px", fontSize: 14, fontWeight: 600,
                  cursor: "pointer", fontFamily: font }}>
                ← Назад
              </button>
              <div style={{ fontSize: 18, fontWeight: 700 }}>{headerTitle}</div>
              {muteBtn}
            </div>
          )}
        </div>
      </div>

      <div style={{ maxWidth: 640, margin: "0 auto", padding: "20px 16px 40px" }}>

        {screen.page === "home" && (
          <div style={{ display: "grid", gap: 10 }}>
            {review.length > 0 && (
              <div onClick={() => setScreen({ page: "review" })}
                style={{ background: C.sun, borderRadius: 16, padding: "15px 18px",
                  cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ fontSize: 28 }}>🔁</div>
                <div>
                  <div style={{ fontSize: 16.5, fontWeight: 800 }}>Повторение</div>
                  <div style={{ fontSize: 13.5, opacity: .8 }}>
                    {review.length} фраз с ошибками — закрепи их
                  </div>
                </div>
              </div>
            )}

            <div onClick={() => setScreen({ page: "basics" })}
              style={{ background: C.ink, color: "#fff", borderRadius: 16, padding: "16px 18px",
                cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 28 }}>📖</div>
              <div>
                <div style={{ fontSize: 17, fontWeight: 700 }}>Начни отсюда: как читать</div>
                <div style={{ fontSize: 13.5, opacity: .8 }}>LL = Ш, J = Х и другие правила + алфавит</div>
              </div>
            </div>

            {LESSONS.map(l => {
              const learned = allPhrases(l).filter(ph => (prog[ph.es]?.lvl || 0) >= 2).length;
              const total = allPhrases(l).length;
              return (
                <div key={l.id} onClick={() => openLesson(l)}
                  style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 16,
                    padding: "15px 18px", cursor: "pointer", display: "flex",
                    alignItems: "center", gap: 14 }}>
                  <div style={{ fontSize: 28 }}>{l.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 16.5, fontWeight: 700 }}>Урок {l.id}. {l.title}</div>
                    <div style={{ fontSize: 13.5, color: C.gray }}>{l.sub}</div>
                  </div>
                  <div style={{ fontSize: 12.5, color: C.celesteDark, fontWeight: 600,
                    background: C.celesteLight, borderRadius: 999, padding: "4px 10px",
                    whiteSpace: "nowrap" }}>
                    {learned > 0 ? `${learned}/${total} ✓` : `${total} фраз`}
                  </div>
                </div>
              );
            })}

            <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: 1,
              textTransform: "uppercase", color: C.celesteDark, margin: "12px 0 0 4px" }}>
              Диалоги — проверь себя в деле
            </div>
            {DIALOGUES.map(d => (
              <div key={d.id} onClick={() => setScreen({ page: "dialogue", dialogue: d })}
                style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 16,
                  padding: "15px 18px", cursor: "pointer", display: "flex",
                  alignItems: "center", gap: 14 }}>
                <div style={{ fontSize: 28 }}>{d.emoji}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16.5, fontWeight: 700 }}>{d.title}</div>
                  <div style={{ fontSize: 13.5, color: C.gray }}>{d.sub}</div>
                </div>
                <div style={{ fontSize: 18 }}>💬</div>
              </div>
            ))}

            {Object.keys(prog).length > 0 && (
              <button onClick={resetProg}
                style={{ background: "none", border: "none", color: C.gray, fontSize: 12.5,
                  cursor: "pointer", fontFamily: font, marginTop: 8, textDecoration: "underline" }}>
                Сбросить весь прогресс
              </button>
            )}
          </div>
        )}

        {screen.page === "basics" && <BasicsView />}

        {screen.page === "review" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ fontSize: 14, color: C.gray }}>
              Здесь собраны фразы, в которых ты ошибался. Ответь правильно три раза подряд — и фраза уйдёт из повторения.
            </div>
            <QuizView pool={review.length ? review : ALL_PHRASES} prog={prog} record={record}
              count={Math.max(5, Math.min(10, review.length))}
              doneText="¡Perfecto! Все ошибки исправлены 🇦🇷" />
          </div>
        )}

        {screen.page === "lesson" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button onClick={() => setMode("study")} style={pillStyle(mode === "study")}>📋 Учить</button>
              <button onClick={() => setMode("flash")} style={pillStyle(mode === "flash")}>🃏 Карточки</button>
              <button onClick={() => setMode("match")} style={pillStyle(mode === "match")}>🔗 Пары</button>
              <button onClick={() => setMode("quiz")} style={pillStyle(mode === "quiz")}>✅ Тест</button>
              {mode === "study" && (
                <button onClick={() => setHideRu(!hideRu)}
                  style={{ ...pillStyle(hideRu), marginLeft: "auto" }}>
                  {hideRu ? "👁 Показать перевод" : "🙈 Скрыть перевод"}
                </button>
              )}
            </div>
            {mode === "study" && <StudyView lesson={screen.lesson} hideRu={hideRu} />}
            {mode === "flash" && <FlashView lesson={screen.lesson} />}
            {mode === "match" && <MatchView pool={allPhrases(screen.lesson)} prog={prog} record={record} />}
            {mode === "quiz" && <QuizView pool={allPhrases(screen.lesson)} prog={prog} record={record} />}
          </div>
        )}

        {screen.page === "dialogue" && (
          <DialogueView dialogue={screen.dialogue} record={record} />
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
