    if (done) {
      const pct = Math.round(score / questions.length * 100);
      return e("div", { style: { textAlign: "center", padding: "30px 0", display: "flex", flexDirection: "column", alignItems: "center", gap: 14 } },
        e(Sun, { size: 54 }), e("div", { style: { fontSize: 30, fontWeight: 800, color: C.ink } }, score, " / ", questions.length),
        e("div", { style: { fontSize: 16, color: C.gray, maxWidth: 340 } }, pct === 100 ? "¡Perfecto! Урок усвоен 🇦🇷" : pct >= 70 ? "¡Muy bien! Ошибки попадут в «Повторение»" : "Dale, ошибки сохранены — они будут попадаться чаще"),
        e("button", { onClick: restart, style: btnStyle(true) }, "Пройти ещё раз"));
    }
    return e("div", { style: { display: "flex", flexDirection: "column", gap: 14 } },
      e("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 13, color: C.gray } }, e("span", null, "Вопрос ", qi + 1, " из ", questions.length), e("span", null, "✓ ", score)),
      e("div", { style: { height: 6, background: C.celesteLight, borderRadius: 3 } }, e("div", { style: { height: 6, width: `${qi / questions.length * 100}%`, background: C.celeste, borderRadius: 3 } })),
      e("div", { style: { background: "#fff", border: `2px solid ${C.celeste}`, borderRadius: 16, padding: "20px 18px", textAlign: "center", position: "relative" } },
        e("div", { style: { fontSize: 13, color: C.gray, marginBottom: 6 } }, "Что это значит?"),
        e("div", { style: { fontSize: 21, fontWeight: 700, color: C.ink } }, q.ph.es),
        e("div", { style: { fontSize: 14, color: C.celesteDark, fontStyle: "italic", marginTop: 4 } }, q.ph.tr)),
      e("div", { style: { display: "grid", gap: 8 } }, q.options.map((opt, i) => {
        let bg = "#fff", border = C.border, color = C.ink;
        if (picked !== null) { if (opt.ru === q.ph.ru) { bg = "#EAF7F0"; border = C.green; color = C.green; } else if (opt === picked) { bg = "#FBEDED"; border = C.red; color = C.red; } }
        return e("button", { key: i, onClick: () => pick(opt), style: { background: bg, border: `2px solid ${border}`, color, borderRadius: 12, padding: "13px 16px", fontSize: 15, fontWeight: 500, textAlign: "left", cursor: picked === null ? "pointer" : "default", fontFamily: font } }, opt.ru);
      })),
      picked !== null && e("button", { onClick: next, style: { ...btnStyle(true), alignSelf: "center" } }, qi + 1 >= questions.length ? "Результат" : "Дальше →")
    );
  }
  function RulesView({ rules }) {
    return e("div", { style: { display: "grid", gap: 10 } }, rules.map((r, i) => e("div", { key: i, style: { background: "#fff", border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 16px" } },
      e("div", { style: { fontSize: 15.5, fontWeight: 700, color: C.celesteDark, marginBottom: 6 } }, r.rule),
      e("div", { style: { fontSize: 13.5, color: C.gray, lineHeight: 1.5, marginBottom: 8 } }, r.body),
      r.ex.map((ex, j) => e("div", { key: j, style: { fontSize: 13.5, color: C.ink, marginBottom: 3 } }, e("b", null, ex[0]), e("span", { style: { color: C.gray } }, " — ", ex[1])))
    )));
  }

  function LessonScreen({ lesson, onBack }) {
    const [mode, setMode] = useState(lesson.rules ? "rules" : "study");
    const [hideRu, setHideRu] = useState(false);
    return e("div", null,
      e("div", { style: { background: `linear-gradient(180deg, ${C.celeste} 0%, ${C.celesteDark} 100%)`, padding: "16px 20px", color: "#fff" } },
        e("div", { style: { maxWidth: 640, margin: "0 auto", display: "flex", alignItems: "center", gap: 10 } },
          e("button", { onClick: onBack, style: { background: "rgba(255,255,255,.2)", border: "none", color: "#fff", borderRadius: 10, padding: "7px 13px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font } }, "← Назад"),
          e("div", null,
            e("div", { style: { fontSize: 17, fontWeight: 700 } }, lesson.emoji, " ", lesson.title),
            lesson.titleRu && e("div", { style: { fontSize: 12.5, opacity: 0.85 } }, lesson.titleRu)
          )
        )
      ),
      e("div", { style: { maxWidth: 640, margin: "0 auto", padding: "20px 16px 40px", display: "flex", flexDirection: "column", gap: 16 } },
        e("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
          lesson.rules && e("button", { onClick: () => setMode("rules"), style: pillStyle(mode === "rules") }, "📖 Правила"),
          e("button", { onClick: () => setMode("study"), style: pillStyle(mode === "study") }, "📋 Учить"),
          e("button", { onClick: () => setMode("flash"), style: pillStyle(mode === "flash") }, "🎴 Карточки"),
          e("button", { onClick: () => setMode("match"), style: pillStyle(mode === "match") }, "🔗 Пары"),
          e("button", { onClick: () => setMode("quiz"), style: pillStyle(mode === "quiz") }, "✅ Тест"),
          mode === "study" && e("button", { onClick: () => setHideRu(!hideRu), style: { ...pillStyle(hideRu), marginLeft: "auto" } }, hideRu ? "👁 Показать перевод" : "🙈 Скрыть перевод")
        ),
        mode === "rules" && lesson.rules && e(RulesView, { rules: lesson.rules }),
        mode === "study" && e(StudyView, { pool: lesson.phrases, hideRu }),
        mode === "flash" && e(FlashView, { pool: lesson.phrases }),
        mode === "match" && e(MatchView, { pool: lesson.phrases }),
        mode === "quiz" && e(QuizView, { pool: lesson.phrases })
      )
    );
  }

  // ================= Домашний экран =================
  function LessonRow({ emoji, title, titleRu, sub, badge, onClick }) {
    return e("div", { onClick, style: { background: "#fff", border: `1px solid ${C.border}`, borderRadius: 16, padding: "13px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12 } },
      e("div", { style: { fontSize: 24 } }, emoji),
      e("div", { style: { flex: 1 } },
        e("div", { style: { fontSize: 15.5, fontWeight: 700 } }, title),
        titleRu && e("div", { style: { fontSize: 12.5, color: C.celesteDark, fontWeight: 600 } }, "— ", titleRu),
        e("div", { style: { fontSize: 12, color: C.gray, marginTop: 1 } }, sub)
      ),
      badge && e("div", { style: { fontSize: 11.5, color: C.celesteDark, fontWeight: 600, background: C.celesteLight, borderRadius: 999, padding: "4px 9px", whiteSpace: "nowrap" } }, badge)
    );
  }

  function App() {
    const [screen, setScreen] = useState({ page: "home" });
    return e("div", { style: { minHeight: "100vh", background: C.paper, fontFamily: font, color: C.ink } },
      e("style", null, `@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap'); *{box-sizing:border-box;margin:0} button:focus-visible{outline:3px solid ${C.sun};outline-offset:2px}`),

      screen.page === "home" && e(React.Fragment, null,
        e("div", { style: { background: `linear-gradient(180deg, ${C.celeste} 0%, ${C.celesteDark} 100%)`, padding: "28px 20px 24px", color: "#fff" } },
          e("div", { style: { maxWidth: 640, margin: "0 auto", display: "flex", alignItems: "center", gap: 12 } },
            e(Sun, { size: 40 }),
            e("div", null, e("div", { style: { fontSize: 25, fontWeight: 800, letterSpacing: -0.5 } }, "Habla Argentina"),
              e("div", { style: { fontSize: 13.5, opacity: 0.9 } }, "Курс А1 · 24 урока"))
          )
        ),
        e("div", { style: { maxWidth: 640, margin: "0 auto", padding: "20px 16px 40px", display: "flex", flexDirection: "column", gap: 8 } },
          e("div", { style: { background: C.celesteLight, border: `1px solid ${C.border}`, borderRadius: 14, padding: "12px 16px", fontSize: 12.5, color: C.celesteDark, fontWeight: 500 } },
            "Весь материал книги A1, но порядок и подача переработаны — это не копия учебника."),
          LESSONS.map(l => e(LessonRow, {
            key: l.id, emoji: l.emoji, title: "Урок " + l.id + ". " + l.title, titleRu: l.titleRu, sub: l.sub,
            badge: l.phrases.length + " слов", onClick: () => setScreen({ page: "lesson", lessonId: l.id })
          }))
        )
      ),

      screen.page === "lesson" && e(LessonScreen, { lesson: LESSONS.find(l => l.id === screen.lessonId), onBack: () => setScreen({ page: "home" }) })
    );
  }

  // ===== ВХОД ПО ЛОГИНУ И ПАРОЛЮ (Firebase) =====
  var FIREBASE_API_KEY = "AIzaSyBDUVPQEpfPOGvkv6trd1GWZAVtesBmMg0";
  var FIREBASE_PROJECT_ID = "habla-argentina";
  var COURSE_KEY = "a1";
  var GATE_KEY = "habla-auth-" + COURSE_KEY;

  function renderApp() {
    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  }

  function showGate() {
    var root = document.getElementById("root");
    root.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
      'font-family:\'Rubik\',-apple-system,\'Segoe UI\',Roboto,sans-serif;background:#FDFDFB;padding:24px">' +
      '<div style="max-width:360px;width:100%;text-align:center">' +
      '<div style="font-size:26px;font-weight:800;color:#1C2B45;margin-bottom:10px">Habla Argentina — курс А1</div>' +
      '<div style="font-size:15px;color:#7A8699;margin-bottom:20px">Введи логин и пароль, которые прислал бот после оплаты</div>' +
      '<input id="gate-email" type="email" placeholder="Почта" autocomplete="username" style="width:100%;box-sizing:border-box;' +
      'padding:14px 16px;font-size:16px;border:2px solid #DCE6F0;border-radius:12px;text-align:center;' +
      'font-family:inherit;margin-bottom:10px" />' +
      '<input id="gate-pass" type="password" placeholder="Пароль" autocomplete="current-password" style="width:100%;box-sizing:border-box;' +
      'padding:14px 16px;font-size:16px;border:2px solid #DCE6F0;border-radius:12px;text-align:center;' +
      'font-family:inherit;margin-bottom:12px" />' +
      '<div id="gate-err" style="color:#D95555;font-size:13.5px;min-height:18px;margin-bottom:10px"></div>' +
      '<button id="gate-btn" style="width:100%;padding:14px;font-size:16px;font-weight:700;color:#fff;' +
      'background:#74ACDF;border:none;border-radius:12px;cursor:pointer;font-family:inherit">Войти</button>' +
      '</div></div>';

    var emailInput = document.getElementById("gate-email");
    var passInput = document.getElementById("gate-pass");
    var btn = document.getElementById("gate-btn");
    var err = document.getElementById("gate-err");

    function tryOpen() {
      var email = (emailInput.value || "").trim();
      var pass = passInput.value || "";
      if (!email || !pass) {
        err.textContent = "Заполни оба поля.";
        return;
      }
      btn.disabled = true;
      btn.textContent = "Проверяю…";
      err.textContent = "";

      fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + FIREBASE_API_KEY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: pass, returnSecureToken: true })
      })
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
        .then(function (res) {
          if (!res.ok) { throw new Error("auth"); }
          var idToken = res.body.idToken;
          var uid = res.body.localId;
          return fetch(
            "https://firestore.googleapis.com/v1/projects/" + FIREBASE_PROJECT_ID +
            "/databases/(default)/documents/purchases/" + uid,
            { headers: { Authorization: "Bearer " + idToken } }
          ).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); });
        })
        .then(function (res) {
          var courses = [];
          if (res.ok && res.body.fields && res.body.fields.courses) {
            var values = res.body.fields.courses.arrayValue.values || [];
            courses = values.map(function (v) { return v.stringValue; });
          }
          if (courses.indexOf(COURSE_KEY) === -1) { throw new Error("no-access"); }
          try { localStorage.setItem(GATE_KEY, JSON.stringify({ email: email, ok: true })); } catch (e) {}
          root.innerHTML = "";
          renderApp();
        })
        .catch(function (e) {
          btn.disabled = false;
          btn.textContent = "Войти";
          if (e && e.message === "no-access") {
            err.textContent = "У этого аккаунта нет доступа к этому курсу.";
          } else {
            err.textContent = "Неверная почта или пароль.";
          }
        });
    }
    btn.addEventListener("click", tryOpen);
    passInput.addEventListener("keydown", function (ev) { if (ev.key === "Enter") tryOpen(); });
    emailInput.addEventListener("keydown", function (ev) { if (ev.key === "Enter") passInput.focus(); });
  }

  // Если уже входили раньше на этом устройстве — не спрашиваем снова.
  var savedAuth = null;
  try { savedAuth = JSON.parse(localStorage.getItem(GATE_KEY) || "null"); } catch (e) {}

  if (savedAuth && savedAuth.ok) renderApp(); else showGate();
})();
</script>
</body>
</html>
